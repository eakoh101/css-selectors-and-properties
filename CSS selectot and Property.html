<form>
    <div>
        <label for="username">Username</label>
        <input type="text" id="username" style="height: 50px;width: 240px;border-radius: 3px;" >
        <label for="email">Email</label>
        <input type="email" id="email" style="height: 50px;width: 240px;border-radius: 3px;" >
        <label for="password">Password</label>
        <input type="text" id="password" style="height: 50px;width: 240px;border-radius: 3px;" pattern="[A-Za-z]" >
        <button type="submit" style="height: 36;width: 120px;color: lightgray;background-color: khaki;">Submit</button>
    </div>
</form>
